table_name: adakami_daily_stats
description: "Adakami daily statistics"

partitioning: 
  enabled: true
  field: data_period
  type: DAY

source_columns:
  include:
    - disburse_amount_total
    - disburse_amount_this_year
    - outstanding_loan_principal_total
    - borrower_count_total
    - disburse_amount_last_month
    - lender_count_total
    - lender_count_year
    - lender_count_month
    - borrower_count_year
    - borrower_count_month
    - fetch_time
    - data_period
  
schema:
  - name: disburse_amount_total
    type: INTEGER
    mode: REQUIRED
    description: "Nilai pendanaan yang tersalurkan sejak melakukan kegiatan usaha"
  - name: disburse_amount_this_year
    type: INTEGER
    mode: REQUIRED
    description: "Nilai pendanaan yang tersalurkan pada tahun berjalan"
  - name: outstanding_loan_principal_total
    type: INTEGER
    mode: REQUIRED
    description: "Jumlah Outstanding Pinjaman Total pinjaman yang sedang berjalan"
  - name: borrower_count_total
    type: INTEGER
    mode: REQUIRED
    description: "Jumlah penerima dana sejak melakukan kegiatan usaha"
  - name: disburse_amount_last_month
    type: INTEGER
    mode: REQUIRED
    description: "Nilai pendanaan yang tersalurkan di bulan terakhir"
  - name: lender_count_total
    type: INTEGER
    mode: REQUIRED
    description: "Jumlah pemberi dana sejak melakukan kegiatan usaha"
  - name: lender_count_year
    type: INTEGER
    mode: REQUIRED
    description: "Jumlah pemberi dana pada tahun berjalan"
  - name: lender_count_month
    type: INTEGER
    mode: REQUIRED
    description: "Jumlah pemberi dana di bulan terakhir"
  - name: borrower_count_year
    type: INTEGER
    mode: REQUIRED
    description: "Jumlah penerima dana pada tahun berjalan"
  - name: borrower_count_month
    type: INTEGER
    mode: REQUIRED
    description: "Jumlah penerima dana di bulan terakhir"
  - name: fetch_time
    type: TIMESTAMP
    mode: REQUIRED
    description: "API fetchtime in UTC"
  - name: data_period
    type: DATE
    mode: REQUIRED
    description: "data period date (from airflow execution date) in Jakarta Time"


