table_name: putusan_ma_pdf_details
description: "details from pdf"

partitioning: 
  enabled: true
  field: putusan_ym
  type: MONTH

clustering:
  enabled: true
  fields: 
    - nomor_putusan

source_columns:
  include:
    - nomor_putusan
    - putusan_ym
    - nama_lengkap
    - tempat_lahir
    - umur_tanggal_lahir
    - jenis_kelamin
    - kebangsaan
    - agama
    - pekerjaan
    - tempat_tinggal
    - mengadili

schema:
  - name: nomor_putusan
    type: STRING
    mode: REQUIRED
    description: "nomor putusan kasus"
  - name: putusan_ym
    type: DATE
    mode: REQUIRED
    description: "putusan_ym, partitioned by read month and taken from logical date or airflow"
  - name: nama_lengkap
    type: STRING
    mode: NULLABLE
    description: "first occurece of nama lengkap in pdf"
  - name: tempat_lahir
    type: STRING
    mode: NULLABLE
    description: "first occurence of tempat lahir in pdf"
  - name: umur_tanggal_lahir
    type: STRING
    mode: NULLABLE
    description: "first occurence of Umur & Tanggal Lahir in pdf"
  - name: jenis_kelamin
    type: STRING
    mode: NULLABLE
    description: "jenis kelamin in pdf"
  - name: kebangsaan
    type: STRING
    mode: NULLABLE
    description: "first occurence of kebangsaan or kewarganegaraan in pdf"
  - name: agama
    type: STRING
    mode: NULLABLE
    description: "first occurence of agama in pdf"
  - name: pekerjaan
    type: STRING
    mode: NULLABLE
    description: "first occurence of pekerjaan in pdf"
  - name: tempat_tinggal
    type: STRING
    mode: NULLABLE
    description: "first occurence of tempat tinggal in pdf"
  - name: keputusan
    type: STRING
    mode: NULLABLE
    description: "takes the first 2 sentences of mengadili/menetapkan section in pdf"
  - name: ingestion_timestamp
    type: TIMESTAMP
    mode: REQUIRED
    description: "Waktu ingestion kedalam bigquery"